# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
#
# Runtime env vars (read by handlers, not by envio):
#   NATS_URL                  — JetStream connection URI (TLS-only)
#   NATS_TLS_CA               — path to CA bundle for the cluster's NATS instance
#   SONAR_SIGNING_SEED_HEX    — 32-byte (64 hex chars) Ed25519 seed for the
#                               events-pillar signer. Absent → publish layer
#                               stays disabled (fail-soft); the indexer still
#                               writes Envio entities as before.
# See src/lib/events-publisher.ts and the cluster-events-pillar-v1 build doc.
name: thj-indexer-8453
# Cache-bust: Path ε rpc-fix deploy 2026-05-27 (Railway BuildKit cache evicted by content change)
contracts:
  - name: HoneyJar
    handler: src/EventHandlers.ts
    events:
      - event: Transfer(address indexed from, address indexed to, uint256 indexed tokenId)
        field_selection:
          transaction_fields:
            - hash
  # Static ERC721 collections for holder tracking
  - name: TrackedErc721
    handler: src/EventHandlers.ts
    events:
      - event: Transfer(address indexed from, address indexed to, uint256 indexed tokenId)
        field_selection:
          transaction_fields:
            - hash
  # PuruApiculture1155 - ERC1155 collection on Base (Zora platform, Purupuru edition)
  - name: PuruApiculture1155
    handler: src/EventHandlers.ts
    events:
      - event: TransferSingle(address indexed operator, address indexed from, address indexed to, uint256 id, uint256 value)
        field_selection:
          transaction_fields:
            - hash
      - event: TransferBatch(address indexed operator, address indexed from, address indexed to, uint256[] ids, uint256[] values)
        field_selection:
          transaction_fields:
            - hash
  # FriendtechShares - friend.tech key trading on Base (tracking Mibera-related subjects)
  - name: FriendtechShares
    handler: src/EventHandlers.ts
    events:
      - event: Trade(address trader, address subject, bool isBuy, uint256 shareAmount, uint256 ethAmount, uint256 protocolEthAmount, uint256 subjectEthAmount, uint256 supply)
        field_selection:
          transaction_fields:
            - hash
  # Tracked ERC-20 tokens for balance + burn tracking (HENLO + HENLOCKED tiers)
  - name: TrackedErc20
    handler: src/EventHandlers.ts
    events:
      - event: Transfer(address indexed from, address indexed to, uint256 value)
        field_selection:
          transaction_fields:
            - hash
            - from # Required for burn tracking
            - to # Required for source detection
