    start_block: 13090020 # Earliest block - Milady contract deployment
    contracts:
      # Native HoneyJar contracts on Ethereum
      - name: HoneyJar
        address:
          - '0xa20cf9b0874c3e46b344deaeea9c2e0c3e1db37d' # HoneyJar1
          - '0x98dc31a9648f04e23e4e36b0456d1951531c2a05' # HoneyJar6
        start_block: 17085858 # HoneyJar1 deployment (HoneyJar6 deployed later at 21642710)
      # Honeycomb on Ethereum
      - name: Honeycomb
        address:
          - '0xcb0477d1af5b8b05795d89d59f4667b59eae9244'
        start_block: 16751283 # Honeycomb deployment
      # Layer Zero reminted HoneyJar contracts on Ethereum
      - name: HoneyJar2Eth
        address:
          - '0x3f4dd25ba6fb6441bfd1a869cbda6a511966456d' # HoneyJar2 L0 remint
        start_block: 17516342 # HoneyJar2 L0 remint deployment
      - name: HoneyJar3Eth
        address:
          - '0x49f3915a52e137e597d6bf11c73e78c68b082297' # HoneyJar3 L0 remint (was missing!)
        start_block: 20463444 # HoneyJar3 L0 remint deployment
      - name: HoneyJar4Eth
        address:
          - '0x0b820623485dcfb1c40a70c55755160f6a42186d' # HoneyJar4 L0 remint (was missing!)
        start_block: 20814248 # HoneyJar4 L0 remint deployment
      - name: HoneyJar5Eth
