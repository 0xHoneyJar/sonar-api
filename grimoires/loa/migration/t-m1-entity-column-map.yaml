# T-M1 — Entity + column mapping (machine-readable companion)
# Source-of-truth for T-M2 transform. Generated from grounded reads:
#   envio  SOURCE: schema.graphql + generated/src/Indexer.res (ReScript entity types)
#   ponder TARGET: ponder.schema.ts (onchainTable defs) + ponder-runtime/src/handlers/** (classification)
# Envio Postgres columns are camelCase VERBATIM (relation fields get _id suffix; Table.res:94).
# Ponder Postgres columns are snake_case (onchain.js:134 toSnakeCase). Both tables under DATABASE_SCHEMA.
# Every ponder PK is the single text column `id`. UPSERT on id.
schema_version: 1
cycle: sonar-ponder-migration-v1
task: T-M1
envio_source_schema: public        # envio blue Postgres-3vIC, public.* (PascalCase tables)
ponder_target_schema: ponder       # Postgres-vRR1, ponder.* (snake_case tables)
boundaries:
  eth: 25184952
  base: 46537425
  berachain: 21424739
  optimism: 152132710
finality_overlap_note: >-
  Per-chain margin set in T-M2. append-only entities use startBlock = boundary - finalityOverlap
  (safe to re-index overlap; PK-collision = onConflictDoNothing SKIP). additive-rollup + rollup-lww
  entities use startBlock = boundary EXACTLY (NO overlap) per T-M0 Appendix B finding 3 — re-indexing
  overlap blocks re-applies increments already baked into envio frozen totals => double-count.
classification_legend:
  append-only-event:  ponder handler insert(...).onConflictDoNothing() OR single .set() — overlap-safe
  additive-rollup:    ponder handler read-modify-write increment / onConflictDoUpdate counter — overlap double-counts
  rollup-lww-state:   onConflictDoUpdate / update().set() last-write-wins STATE (not additive counter) — overlap-sensitive, treat as no-overlap
  "*-no-handler":     table defined in ponder.schema.ts but NO ponder handler writes it (not registered in ponder-runtime/src/index.ts). Classified by ENVIO source semantics. Ponder will NOT index it forward; frozen-import only; startBlock policy informational.
