# B-1 — Green-belt entity + column mapping (machine-readable companion)
# Source-of-truth for the B-1 transform extension (extends scripts/migration/entity-map.ts).
# Mirrors the T-M1 format (grimoires/loa/migration/t-m1-entity-column-map.yaml).
#
# Grounded double-sided (NO inferred columns):
#   envio  SOURCE: schema.graphql (GraphQL entity defs) + generated/src/Indexer.res
#                  (ReScript entity `type t` records — the canonical Postgres column types).
#                  Envio Postgres columns are camelCase VERBATIM; relation fields get `_id`
#                  suffix (e.g. WithdrawalRequest.batch -> batch_id; Indexer.res:813).
#   ponder TARGET: PROPOSED. ponder.schema.ts does NOT yet contain ANY green-belt table
#                  (verified: it has exactly the 40 Mibera onchainTable defs + 2 runtime-
#                  excluded). snake_case names below follow ponder's onchain.js toSnakeCase
#                  (same rule the 40 used). Every PK is single text column `id`. UPSERT on id.
#
# GREEN BELT = ALL 93 envio entities (schema.graphql) MINUS the 40 Mibera in-scope (T-M1).
#   93 - 40 = 53 green-belt entities.
#
# Of the 53: 43 are LIVE (a handler writes them) and 10 are DEAD (defined in schema.graphql
# but NO handler writes them — 0 rows; excluded from import). See `dead_entities:` below.
#
# Type-drift legend (transforms beyond pure snake_case rename):
#   rename             : camelCase -> snake_case, identical type.
#   jsonb_to_text      : envio jsonb -> ponder text (JSON.stringify). [40-set precedent: badge_holder.holdings]
#   array_to_json_text : envio array<bigint>/array<string> (pg _numeric/_text) -> ponder text;
#                        MUST be JSON.stringify(arr.map(String)), NOT a ::text cast.
#   timestamp_to_bigint: ** GREEN-BELT-ONLY DRIFT ** envio `Timestamp` scalar is stored as
#                        Js.Date.t => Postgres `timestamp`/`timestamptz`, NOT bigint. The 40
#                        Mibera set has NO Timestamp-scalar columns (all their times are BigInt).
#                        Ponder target is `bigint` (epoch seconds). Transform MUST convert
#                        the pg timestamp to epoch: EXTRACT(EPOCH FROM col)::bigint (or
#                        Math.floor(date.getTime()/1000) in TS). Affects the validator family
#                        + withdrawal family (the 906k-row leader).
#
# Classification legend (same as T-M1 — operationalizes the T-M0 double-count finding):
#   append             : handler insert/set with deterministic txHash_logIndex id, no read-modify-write -> overlap-safe -> startBlock = boundary - finalityOverlap
#   append-running     : append-keyed (one row per event) BUT each row carries cumulative running totals copied from prior row (previousRewards + delta). Idempotent on replay IF prior present, but treat as no-overlap (startBlock = boundary) to be safe. (validator rewards/deposits)
#   rollup             : read-modify-write additive counter / onConflictDoUpdate increment -> overlap double-counts -> startBlock = boundary EXACTLY (no overlap)
#   rollup-lww         : last-write-wins STATE mutation (status flip / latest snapshot), not additive -> overlap-sensitive -> startBlock = boundary EXACTLY
#   *-no-handler       : LIVE in envio but NO ponder handler exists yet (gap). Classified by ENVIO source semantics. Frozen-imports fine; ponder will NOT index it forward until a handler is ported. start_block_policy is informational until the handler lands.
#
# HANDLER-GAP (the key B-1 finding): of the 44 LIVE green-belt entities, ZERO have a ponder
# handler today (ponder-runtime/src/index.ts registers only the 15 Mibera-set handler files;
# none write a green-belt entity). So ALL 44 are `*-no-handler` and frozen-import-only until
# their envio handler is PORTED. The per-entity `ponder_handler_gap` + `envio_handler` fields
# below are the work estimate. See b-1-handler-gap.md for the grouped roll-up.

schema_version: 1
cycle: sonar-ponder-migration-v1
task: B-1
envio_source_schema: public        # envio blue Postgres-3vIC, public.* (PascalCase tables)
ponder_target_schema: ponder       # Postgres-vRR1, ponder.* (snake_case tables) — PROPOSED additions

# All 6 envio chains (config.yaml:553-957). The 40 Mibera used 4 (eth/base/bera/op);
# the green belt adds Arbitrum (42161) + Zora (7777777) for the HoneyJar genesis spread.
chains:
  ethereum:  { id: 1,        boundary_known: 25184952 }   # eth boundary (T-M1)
  base:      { id: 8453,     boundary_known: 46537425 }   # base boundary (T-M1)
  berachain: { id: 80094,    boundary_known: 21424739 }   # bera boundary (T-M1)
  optimism:  { id: 10,       boundary_known: 152132710 }  # op boundary (T-M1)
  arbitrum:  { id: 42161,    boundary_known: null }        # GREEN-BELT-NEW — re-ground from envio chain_metadata.latest_processed_block before T-M2-style import
  zora:      { id: 7777777,  boundary_known: null }        # GREEN-BELT-NEW — re-ground boundary

boundary_note: >-
  The 4 Mibera-shared chains already have verified boundaries (T-M1). Arbitrum + Zora are
  NEW chains the green belt introduces (HoneyJar genesis only); their per-chain
  latest_processed_block boundary MUST be re-grounded from envio chain_metadata before any
  import — DO NOT reuse the Mibera boundaries for them.

