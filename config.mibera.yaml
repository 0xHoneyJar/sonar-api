  # ── Ethereum (1) — MiladyCollection (NftBurn:milady). Densest chain; Milady Transfer
  # volume is very large → may need bounded HyperSync / paid RPC if eRPC ETA is unacceptable.
  - id: 1
    start_block: 13090020 # Milady contract deployment (MiladyCollection inherits this floor)
    rpc:
      url: http://erpc.railway.internal:4000/main/evm/1
      for: sync
    contracts:
      - name: MiladyCollection
        address:
          - 0x5af0d9827e0c53e4799bb226655a1de152a425a5 # Milady Maker
