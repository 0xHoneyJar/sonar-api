      - name: PaddleFi
        address:
          - 0x242b7126F3c4E4F8CbD7f62571293e63E9b0a4E1 # PaddleFi MIBERA-WBERA vault
        start_block: 5604652 # PaddleFi deployment
      - name: BgtToken
