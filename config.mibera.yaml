  # ── Base (8453) — FriendtechShares + TrackedErc20(MiberaMaker333). DATA SOURCE: HyperSync.
  # friend.tech Trade volume is enormous (event args unindexed → ALL Trades fetched); free
  # eRPC crawled at ~20 blk/s (effectively won't finish), so this leg uses HyperSync (needs
  # ENVIO_API_TOKEN) — the break-glass for the dense op-stack backfill (2026-05-21 decision:
  # we pay a vendor for the one-time dense fill; eRPC cache + free realtime cover the rest).
  # To return to sovereign realtime later, restore the rpc: block (eRPC route /8453) + resume.
  #   rpc: { url: http://erpc.railway.internal:4000/main/evm/8453, for: sync }
  - id: 8453
    start_block: 2430439 # friend.tech start block (earliest contract; FriendtechShares inherits this floor)
    # Path ε HyperSync-strip 2026-05-27 — operator deleted the HyperSync token; the
    # 2026-05-21 break-glass (dense friend.tech backfill) is no longer accessible.
    # Returning to sovereign realtime via eRPC + HyperRPC paid + multi-upstream Base
    # cluster (publicnode/tenderly/drpc). Slower backfill on dense ranges; accepts
    # the trade for cluster-owned chain-read substrate (memory
    # erpc-postgres-becomes-hypersync).
    rpc_config:
      url: http://erpc.railway.internal:4000/main/evm/8453
    contracts:
      - name: FriendtechShares
        address:
          - 0xCF205808Ed36593aa40a44F10c7f7C2F67d4A4d4
      - name: TrackedErc20
        address:
          - 0x120756ccc6f0cefb43a753e1f2534377c2694bb4 # MiberaMaker333
        start_block: 33657372 # MiberaMaker333 deployment

  # ── Optimism (10) — MiberaSets, MiberaZora1155, MirrorObservability, TrackedErc721 (lore).
  - id: 10
