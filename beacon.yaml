deploy_model:
  status: verified
  pattern: vercel-for-indexers
  alias_is_contract: true
  immutable_deployments: true
  services:
    - name: belt-gateway
      alias: sonar.0xhoneyjar.xyz
      deployment_status: SUCCESS
    - name: belt-hasura-selfhost
      deployment_status: SUCCESS
    - name: belt-indexer-selfhost
      deployment_status: SUCCESS
    - name: svm-webhook
      deployment_status: SUCCESS
    - name: kitchen-api
      deployment_status: SUCCESS
    - name: Postgres-6J4w
      deployment_status: SUCCESS
  probe_source: fixture
events:
  status: unverified
  transport: nats-jetstream
  publishes:
    - topic: mibera.*.minted.v1
      schema: "@0xhoneyjar/events/schemas/nft-mint-detected"
consumers:
  - name: score-api
    reads:
      - graphql
  - name: freeside-inventory
    reads:
      - graphql
  - name: mibera-codex
    reads:
      - graphql
acvp_invariants:
  - id: event_completeness
    status: aspirational
    proof: tests/acvp/event_completeness.test.ts
    scope: No event drops between block N and N+1 for any indexed contract source on any chain
  - id: monotonicity
    status: aspirational
    proof: tests/acvp/monotonicity.test.ts
    scope: latest_processed_block on a given chainId never decreases on the live alias (reorgs handled in-belt)
  - id: audit_replay
    status: aspirational
    proof: tests/acvp/audit_replay.test.ts
    scope: Reindexing the consolidated belt from per-chain start_block produces byte-identical Action / Transfer / MintEvent rows
