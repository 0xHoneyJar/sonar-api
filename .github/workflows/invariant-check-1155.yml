name: mv_holder_1155 Conservation Invariants

# Runs on every PR targeting main and on direct pushes to main.
# Requires DATABASE_URL secret pointing to the serving DB or a CI-accessible snapshot.
# The operator decides the DB target before this workflow is enabled on the repo.
#
# Sprint: spiral-pertoken-projection-1 · Task T4
# SDD ref: §3.5, §8 Phase 2

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
      - 'scripts/invariant-check-1155.sh'
  pull_request:
    branches: [main]
    paths:
      - 'migrations/**'
      - 'scripts/invariant-check-1155.sh'
      - 'src/handlers/**'

jobs:
  invariant-check:
    name: mv_holder_1155 Conservation Invariants
    runs-on: ubuntu-latest

    # Requires the DATABASE_URL secret to be set in the repository.
    # If the secret is absent, this job is skipped (not failed).
    # Operator: add the secret before enabling this workflow.
    env:
      DATABASE_URL: ${{ secrets.BELT_DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Check DATABASE_URL is configured
        run: |
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "::warning::BELT_DATABASE_URL secret is not set — skipping invariant check."
            echo "::warning::Add the BELT_DATABASE_URL secret to enable this check."
            exit 0
          fi
          echo "DATABASE_URL is configured."

      - name: Run conservation invariant checks
        if: env.DATABASE_URL != ''
        run: |
          chmod +x scripts/invariant-check-1155.sh
          scripts/invariant-check-1155.sh
        env:
          DATABASE_URL: ${{ secrets.BELT_DATABASE_URL }}
          I3_TOKEN4_TOP_HOLDER_ADDRESS: ${{ secrets.I3_TOKEN4_TOP_HOLDER_ADDRESS }}
          I3_ROUTER_ADDRESS: ${{ secrets.I3_ROUTER_ADDRESS }}

      - name: Upload invariant check output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-check-failures
          path: /tmp/invariant-check-*.log
          retention-days: 7
