# belt-build.yml — the Envio belt build gate (the LIVE production validation).
#
# Project CI for the freeside-sonar belt factory — distinct from ci.yml, which
# is the loa-framework template CI.
#
# RUNTIME REALITY: this repo runs self-hosted Envio HyperIndex. package.json
# name=envio-indexer; scripts are `envio codegen/dev/start`; Dockerfile.belt runs
# `pnpm envio start`; the live Railway belt-indexer-selfhost service runs
# BELT_CONFIG=config.yaml on Envio. ponder-runtime/ was REMOVED — kitchen HTTP
# lives in src/kitchen/ (Dockerfile.kitchen → Railway kitchen-api). THIS file
# is the production gate: green here means the live Envio belt is shippable.
#
# Gates, in order:
#
#   1. verify:belt-config  — BLOCKING. The config-fidelity check: field_selection
#      and start_block are identical; critical addresses are identical.
#      TrackedErc721 and EthTrackedErc721 are explicitly expansion-safe: each
#      non-empty belt list remains a subset while config.yaml may add communities.
#      A belt config that drops a field a handler reads produces silently-wrong
#      data, not a crash — this makes that unshippable.
#   2. belt-safe suite — BLOCKING. `pnpm test:belt` keeps the repository's
#      passing EVM/config/handler regressions blocking while explicitly
#      quarantining only known-red files already failing on main (#218).
#      SQD's live integration stays in its dedicated blocking workflow.
#   3-4. codegen:mibera / typecheck:mibera — INFORMATIONAL (continue-on-error).
#      These invoke the real `envio` CLI, which is NOT provisioned in CI (envio is
#      not in package.json / pnpm-lock, and no workflow installs it). They run as a
#      best-effort signal and stay skipped-green until an envio binary (or a
#      self-hosted runner) is provisioned. They are NOT "retired": Envio is the
#      live runtime; this is a CI-provisioning gap.
#
# Factory invariant: each belt gets a job here.

name: Belt Build Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  envio-belt:
    name: Envio belt — config · tests (blocking) · codegen/typecheck (informational)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gates 1a/1b — BLOCKING. The floor registry is the single source of truth;
      # config drift or a cohort that starts after a required floor is unshippable.
      - name: Gate 1a — historical floor materialization drift
        run: pnpm materialize:eth-floor:check

      - name: Gate 1b — historical floor coverage enforcement
        run: pnpm verify:historical-floors:enforce

      # Gate 1c — BLOCKING. Config-fidelity drift would produce silently-wrong data.
      - name: Gate 1c — belt config fidelity (verify-belt-config)
        run: pnpm verify:belt-config

      - name: Anti-ponder guard (kitchen lives in src/kitchen/)
        run: test ! -d ponder-runtime && ! grep -q '"ponder"' package.json

      # Gate 2 — BLOCKING. Inclusive passing suite: all live EVM/config/handler
      # regressions remain blocking. Exact known-red files are quarantined in
      # package.json under #218 until their owners repair or re-home them.
      # ENVIO321_CONFIG targets the live green belt.
      - name: Gate 2 — belt-safe inclusive tests (vitest)
        env:
          ENVIO321_CONFIG: config.yaml
        # package script uses lockfile-pinned vitest, not runtime-resolved npx.
        run: pnpm test:belt

      # Gate 2b — beacon drift (offline). Exit 2 fails CI (no --allow-unknown).
      - name: Gate 2b — beacon drift check (sonar self)
        run: pnpm self:check

      # Gate 3 — INFORMATIONAL. Scoped `envio codegen --config config.mibera.yaml`.
      # Requires the `envio` CLI, which is NOT provisioned in CI (not in
      # package.json / pnpm-lock; no install step). Best-effort until a binary or a
      # self-hosted runner is added. NOT a retired path.
      - name: "Gate 3 — scoped codegen (config.mibera.yaml) [informational: envio CLI not in CI]"
        continue-on-error: true
        run: pnpm codegen:mibera

      # Gate 4 — INFORMATIONAL. Belt-scoped typecheck depends on Gate 3's codegen
      # output (generated/), so it is gated on the same missing envio CLI.
      - name: "Gate 4 — belt-scoped typecheck (tsconfig.mibera.json) [informational: depends on codegen output]"
        continue-on-error: true
        run: pnpm typecheck:mibera
