name: Model Registry Drift Gate

# cycle-099 sprint-1B (T1.5) — CI gate that catches drift between
# .claude/defaults/model-config.yaml (source of truth) and the codegen
# outputs that consumers compile against:
#
#   - .claude/scripts/generated-model-maps.sh         (cycle-095 gen-adapter-maps.sh)
#   - .claude/skills/bridgebuilder-review/resources/{core/truncation.generated.ts, config.generated.ts}
#     (sprint-1A gen-bb-registry.ts)
#   - .claude/defaults/model-config.yaml.checksum     (sprint-1B T1.6 lockfile)
#
# Every PR that touches the yaml or the generated artifacts must regenerate
# all three so the drift surface stays at zero (PRD G-3).

on:
  pull_request:
    paths:
      - '.claude/defaults/model-config.yaml'
      - '.claude/defaults/model-config.yaml.checksum'
      - '.claude/scripts/generated-model-maps.sh'
      - '.claude/scripts/gen-adapter-maps.sh'
      # cycle-099 sprint-1B (BB iter-1 F4): include the resolver lib + bats
      # tests. Resolver edits or test-coverage drift should re-run the gate
      # so a future edit that breaks the contract surfaces in CI, not after
      # merge.
      - '.claude/scripts/lib/model-resolver.sh'
      - '.claude/scripts/red-team-model-adapter.sh'
      - '.claude/scripts/red-team-code-vs-design.sh'
      - '.claude/scripts/model-adapter.sh'
      - 'tests/integration/lockfile-checksum.bats'
      - 'tests/integration/legacy-adapter-still-works.bats'
      - 'tests/integration/model-registry-sync.bats'
      # cycle-099 sprint-1C review fix: runbook bumps must re-run the gate
      # so version drift across runbook + workflow surfaces in CI.
      - 'grimoires/loa/runbooks/codegen-toolchain.md'
      - 'tools/check-codegen-toolchain.sh'
      - '.claude/skills/bridgebuilder-review/scripts/gen-bb-registry.ts'
      - '.claude/skills/bridgebuilder-review/resources/core/truncation.generated.ts'
      - '.claude/skills/bridgebuilder-review/resources/config.generated.ts'
      - '.claude/skills/bridgebuilder-review/package.json'
      - '.claude/skills/bridgebuilder-review/package-lock.json'
      - '.github/workflows/model-registry-drift.yml'

permissions:
  contents: read

concurrency:
  group: model-registry-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-checksum:
    name: Lockfile checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify model-config.yaml.checksum matches yaml SHA256
        run: |
          set -euo pipefail
          # Avoid UUOC + redundant pattern (BB iter-1 F6): [:space:] already
          # includes \n; tr-from-stdin does not need cat.
          recorded="$(tr -d '[:space:]' < .claude/defaults/model-config.yaml.checksum)"
          computed="$(sha256sum < .claude/defaults/model-config.yaml | awk '{print $1}')"
          if [ "$recorded" != "$computed" ]; then
              echo "::error::[DRIFT-LOCKFILE-MISMATCH] model-config.yaml mutated without checksum bump"
              echo "  recorded:  $recorded"
              echo "  computed:  $computed"
              echo
              echo "Refresh the lockfile:"
              echo "  sha256sum .claude/defaults/model-config.yaml | awk '{print \$1}' > .claude/defaults/model-config.yaml.checksum"
              exit 1
          fi
          echo "Lockfile in sync (sha256 = $recorded)"

  bash-codegen-check:
    name: Bash codegen (gen-adapter-maps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install yq (pinned + sha256-verified)
        run: |
          set -euo pipefail
          # mikefarah/yq v4 — same toolchain as the generator.
          # Pinned to v4.52.4 to match .github/workflows/bats-tests.yml.
          # SHA256 verification mirrors the actions/checkout SHA pinning
          # discipline (closes BB iter-1 yq-unverified-download HIGH).
          local_yq=/tmp/yq-${{ github.run_id }}
          expected_sha256='0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c'
          wget -qO "$local_yq" https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "$expected_sha256  $local_yq" | sha256sum -c -
          sudo install -m 0755 "$local_yq" /usr/local/bin/yq
          rm "$local_yq"
          yq --version

      - name: Run gen-adapter-maps --check
        run: |
          set -euo pipefail
          if ! bash .claude/scripts/gen-adapter-maps.sh --check; then
              echo "::error::[DRIFT-DETECTED] generated-model-maps.sh stale vs model-config.yaml"
              echo "  regenerate: bash .claude/scripts/gen-adapter-maps.sh"
              exit 1
          fi
          echo "generated-model-maps.sh in sync"

  ts-codegen-check:
    name: TS codegen (gen-bb-registry, ${{ matrix.os }})
    # cycle-099 sprint-1C (T1.7): matrix CI verifying the bridgebuilder codegen
    # produces byte-identical output across linux + macos. Each runner runs
    # `npm run gen-bb-registry:check` against the committed tree — if both
    # pass, both platforms produce byte-equal output.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install yq (pinned + sha256-verified, platform-aware)
        run: |
          set -euo pipefail
          # SHA256-pinned per-platform binary. Closes BB iter-1 HIGH (linux)
          # + sprint-1C subagent review H1 (macos). Hashes verified 2026-05-04
          # from official mikefarah/yq v4.52.4 release artifacts via:
          #   curl -sL <url> | shasum -a 256
          case "${{ matrix.os }}" in
              ubuntu-latest)
                  yq_url='https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64'
                  expected_sha256='0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c'
                  ;;
              macos-latest)
                  # GitHub macos-latest is arm64 (M1/M2/M3) since 2024-Q3.
                  yq_url='https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_darwin_arm64'
                  expected_sha256='6bfa43a439936644d63c70308832390c8838290d064970eaada216219c218a13'
                  ;;
              *)
                  echo "::error::Unsupported runner os: ${{ matrix.os }}"
                  exit 1
                  ;;
          esac
          local_yq=/tmp/yq-${{ github.run_id }}
          curl -fsSL --retry 3 --max-time 60 -o "$local_yq" "$yq_url"
          # Use shasum (POSIX-portable) instead of sha256sum (GNU only) so the
          # same workflow lines work on macos without a coreutils detour.
          echo "$expected_sha256  $local_yq" | shasum -a 256 -c -
          sudo install -m 0755 "$local_yq" /usr/local/bin/yq
          rm "$local_yq"
          yq --version

      - name: Install BB skill devDeps (pinned tsx + typescript)
        working-directory: .claude/skills/bridgebuilder-review
        run: npm ci

      - name: Install GNU bash on macOS (toolchain requires bash 5.0+)
        if: matrix.os == 'macos-latest'
        # macOS runners ship bash 3.2 by default (Apple stopped updating
        # due to GPL3 licensing). tools/check-codegen-toolchain.sh requires
        # bash >= 5.0 and was failing the macos-latest matrix variant on
        # every PR since the gate landed (admin-merged through #945, #946,
        # #949, #950 before this fix). brew bash installs to /opt/homebrew/
        # bin/bash, which `command -v bash` then prefers over /bin/bash.
        run: |
          brew install bash
          # Verify the new bash is on PATH (homebrew prepends /opt/homebrew/bin)
          bash --version | head -1

      - name: Verify pinned codegen toolchain
        # Closes BB iter-1 F7: the paths filter triggers this workflow when
        # tools/check-codegen-toolchain.sh changes, but until this step was
        # added, the script itself was never executed. Now a regression in
        # the script's version-comparison logic surfaces in CI.
        run: bash tools/check-codegen-toolchain.sh

      - name: Run gen-bb-registry --check
        working-directory: .claude/skills/bridgebuilder-review
        run: |
          set -euo pipefail
          if ! npm run gen-bb-registry:check; then
              echo "::error::[DRIFT-DETECTED] BB skill generated TS stale vs model-config.yaml"
              echo "  regenerate: cd .claude/skills/bridgebuilder-review && npm run gen-bb-registry"
              exit 1
          fi
          echo "BB skill generated TS in sync"
