# =============================================================================
# BATS Shell Tests
# =============================================================================
# Runs BATS test suites for shell scripts and framework infrastructure.
# Two test directories:
#   - tests/unit/           — Framework unit tests (58 files)
#   - .claude/scripts/tests/ — Script-level tests (20 files)
#
# Triggers on changes to shell scripts, test files, or this workflow.
#
# PINNING POLICY: All external dependencies are pinned to specific versions
# with integrity verification. This prevents supply-chain attacks where a
# compromised "latest" release silently poisons CI. To rotate:
#   1. Update the version and download URL
#   2. Recompute SHA256: wget -qO- <url> | sha256sum
#   3. Update the checksum in the verification step

name: BATS Tests

on:
  push:
    branches: [main]
    paths:
      - '.claude/scripts/**'                # BB iter-2 BF-003 closure (was *.sh; missed .legacy)
      - '.claude/adapters/**/*.py'         # BB iter-1 FIND-005 closure
      - '.claude/defaults/**'              # BB iter-1 FIND-005 closure
      - 'tests/unit/**'
      - 'tests/integration/**'
      - 'tests/lib/**'
      - 'tests/fixtures/**'
      - 'tests/run-unit-tests.sh'
      - 'grimoires/loa/runbooks/curl-mock-harness.md'  # BB iter-1 FIND-005
      - '.github/workflows/bats-tests.yml'
      - '.github/workflows/secret-scanning.yml' # bug-992: contract test pins this workflow's shape
  pull_request:
    branches: [main]
    paths:
      - '.claude/scripts/**'                # BB iter-2 BF-003 closure (was *.sh; missed .legacy)
      - '.claude/adapters/**/*.py'         # BB iter-1 FIND-005 closure
      - '.claude/defaults/**'              # BB iter-1 FIND-005 closure
      - 'tests/unit/**'
      - 'tests/integration/**'
      - 'tests/lib/**'
      - 'tests/fixtures/**'
      - 'tests/run-unit-tests.sh'
      - 'grimoires/loa/runbooks/curl-mock-harness.md'  # BB iter-1 FIND-005
      - '.github/workflows/bats-tests.yml'
      - '.github/workflows/secret-scanning.yml' # bug-992: contract test pins this workflow's shape

permissions:
  contents: read

# REQUIRE_TESTS: When true, missing test directories fail the job.
# Loa's own repo sets this to true. Downstream repos that fork this
# workflow should set to false (missing dirs = expected, not an error).
env:
  REQUIRE_TESTS: 'true'

jobs:
  bats:
    name: Shell Tests
    runs-on: ubuntu-latest
    steps:
      # PINNING: SHA verified against actions/checkout v4.3.1 tag
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure git identity for tests
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@example.com"

      # PINNING: SHA matches the actions/setup-python v5.3.0 pin used by
      # cycle099-sprint-1e-tests.yml and jcs-conformance.yml. Rotate together.
      # bug-886: tests/unit/ exercises lib/jcs.sh (rfc8785), trust-store
      # signing (rfc8785 + cryptography), and yaml/schema suites
      # (ruamel.yaml + jsonschema) — without these installs ~22 bats fail.
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'

      - name: Install Python deps for bats suites
        run: |
          python -m pip install --upgrade pip
          # Pins match cycle099-sprint-1e-tests.yml (ruamel.yaml, jsonschema),
          # the jcs-conformance suite (rfc8785), and ubuntu-latest's
          # cryptography floor. Keep pin sites in sync when rotating.
          # pyyaml: setup-python creates a CLEAN env — the suite's 16+ `import yaml`
          # consumers previously leaned on ubuntu's system python3-yaml (PR #996
          # empirical run: omitting it broke 182 tests). Pin matches
          # cycle099-sprint-2d-c-ts-tests.yml.
          # idna: endpoint-validator's Unicode hostname canonicalization
          # (lib/endpoint-validator.sh:39 requires idna>=3.6) — system python has
          # it, the clean env does not (PR #996 run 2: broke the guarded_curl
          # chain behind call_api / 401-handler suites).
          pip install 'rfc8785==0.1.4' 'jsonschema==4.26.0' 'ruamel.yaml==0.18.17' 'cryptography==46.0.7' 'pyyaml==6.0.2' 'idna==3.10'

      # NOTE: yq install step is below (line ~85) and is pre-existing on main.
      # cycle-102 Sprint 1C T1C.1 made yq a hard requirement for the curl-mock
      # harness shim (per BB iter-1 F1/FIND-001: tool absence must be a hard
      # error, never a soft fallback — the prior grep-fallback silently dropped
      # multiline body content). The existing pinned install satisfies this.
      # BB iter-2 BF-001 HIGH was a false positive: the dissenter and reviewer
      # both missed the pre-existing yq install step in the workflow.
      #
      # PINNING: bats-core v1.13.0 — commit SHA verified after clone
      - name: Install bats-core v1.13.0
        run: |
          git clone --branch v1.13.0 --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          cd /tmp/bats-core
          expected="3bca150ec86275d6d9d5a4fd7d48ab8b6c6f3d87"
          actual=$(git rev-parse HEAD)
          if [ "$actual" != "$expected" ]; then
            echo "ERROR: bats-core commit SHA mismatch — expected $expected, got $actual"
            exit 1
          fi
          sudo ./install.sh /usr/local
          bats --version

      - name: Install yq v4.52.4 (pinned + checksum verified)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Run framework unit tests
        run: |
          if [ -d tests/unit ]; then
            count=$(find tests/unit -maxdepth 1 -name '*.bats' -type f | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "ERROR: tests/unit/ exists but contains no .bats files"
              exit 1
            fi
            echo "Running $count test files from tests/unit/ ..."
            bats tests/unit/
          else
            if [ "$REQUIRE_TESTS" = "true" ]; then
              echo "ERROR: tests/unit/ directory required but not found (REQUIRE_TESTS=true)"
              exit 1
            else
              echo "WARNING: tests/unit/ directory not found — skipping"
            fi
          fi

      - name: Run script tests
        run: |
          if [ -d .claude/scripts/tests ]; then
            count=$(find .claude/scripts/tests -maxdepth 1 -name '*.bats' -type f | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "ERROR: .claude/scripts/tests/ exists but contains no .bats files"
              exit 1
            fi
            echo "Running $count test files from .claude/scripts/tests/ ..."
            bats .claude/scripts/tests/
          else
            if [ "$REQUIRE_TESTS" = "true" ]; then
              echo "ERROR: .claude/scripts/tests/ directory required but not found (REQUIRE_TESTS=true)"
              exit 1
            else
              echo "WARNING: .claude/scripts/tests/ directory not found — skipping"
            fi
          fi

      - name: Run sprint-1C curl-mock harness integration tests
        # cycle-102 Sprint 1C T1C.8: scoped to the 3 sprint-1C integration
        # test files. tests/integration/ has 110+ pre-existing files that
        # were not previously CI'd; surfacing them all in this PR would
        # conflate sprint-1C's substrate proof with a fleet of unrelated
        # pre-existing test debt. Bringing them into CI is a separate,
        # non-trivial scope (and properly belongs to the directory's
        # original owners, not Sprint 1C).
        #
        # `if: always()` ensures this step runs even when prior unit/script
        # test steps fail (pre-existing main failures: 137/141 BHM-T1/T5,
        # 1002 flatline >100KB, etc.). Without it, sprint-1C's own test
        # results would be masked. Independent failure modes surface
        # independently.
        if: always()
        run: |
          set -euo pipefail
          # Sprint-1C scope only — the files this PR added/modified.
          # NOTE: tests/integration/model-adapter-call-shape.bats was
          # deleted in cycle-109 Sprint 3 T3.7 alongside model-adapter.sh.legacy
          # (commit 2ecaac54 under C109.OP-S3); list entry removed for
          # CI greenness. The other two sprint-1C bats files remain.
          SPRINT_1C_TESTS=(
            tests/integration/curl-mock-harness.bats
            tests/integration/cheval-error-json-shape.bats
          )
          missing=()
          for f in "${SPRINT_1C_TESTS[@]}"; do
            if [ ! -f "$f" ]; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: missing sprint-1C test files: ${missing[*]}"
            exit 1
          fi
          echo "Running ${#SPRINT_1C_TESTS[@]} sprint-1C test files from tests/integration/ ..."
          bats "${SPRINT_1C_TESTS[@]}"
