# ponder-ci.yml — the PRODUCTION validation gate.
#
# Why this exists: until now, NOTHING in CI validated the live ponder runtime.
# belt-build.yml validates the retired envio belt (its codegen can't even run —
# envio was removed in the ponder migration), and ci.yml validates loa-template
# framework files. So the 40KB ponder.schema.ts and the ~40 ponder-runtime
# handlers — the code that actually runs the indexer in production — were sensed
# by NOTHING. #62 and #63 merged with zero CI validation of the live code; the
# only check was running tsc + vitest locally.
#
# This job is the sensor for that blind spot. Green here means: the production
# ponder code typechecks, every test passes, and no handler introduced
# replay-nondeterminism. Red here means a real problem with shippable code —
# which is what lets us merge cleanly (a red check that MEANS something).
#
# Note: whole-repo `tsc` is deliberately not run — the 27 non-belt monolith
# handlers import envio-generated types that belt-scoped codegen never makes
# (DISS-002). The authoritative scope is ponder-runtime/tsconfig.json.

name: Ponder CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ponder-runtime:
    name: Ponder Runtime — typecheck · tests · determinism
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The live schema + handlers + configs + tests typecheck closure.
      - name: Typecheck (ponder-runtime)
        run: npx tsc -p ponder-runtime/tsconfig.json --noEmit

      # 96 test files: byte-parity, reorg-safety, holder math, address-type, etc.
      - name: Tests (vitest)
        run: pnpm test

      # Sensor for the determinism bug-class FAGAN spent 5 iterations on (#63):
      # no persisted wall-clock, no unpinned block-handler RPC reads.
      - name: Handler determinism lint
        run: bash scripts/lint-handler-determinism.sh
