      # Pawn = Deposit NFT as collateral (borrower pawns Mibera NFTs)
      - event: Pawn(address borrower, uint256[] nftIds)
        field_selection:
          transaction_fields:
            - hash
      # LiquidateBorrow = Liquidation event (liquidator repays debt, seizes NFT collateral)
      - event: LiquidateBorrow(address liquidator, address borrower, uint256 repayAmount, uint256[] nftIds)
