  - name: FatBeraDeposits
    # Merged FatBeraDeposits + FatBeraAccounting (same address 0xBAE1…91d4) per the
    # PR #75 "H1" review intent (see src/handlers/fatbera.ts:146). The handler registers
    # ALL five events under FatBeraDeposits; the former separate FatBeraAccounting entry
    # left its 4 reward/withdrawal events configured-but-never-registered (bd-fssj:
    # registration-coverage gaps=4/orphans=4). Network start_block uses the earlier
    # 1066385 so the reward/withdrawal events (which predate deposits) are not missed.
    handler: src/EventHandlers.ts
    events:
      - event: Deposit(address indexed sender, address indexed owner, uint256 assets, uint256 shares)
        field_selection:
          transaction_fields:
            - hash
            - from
            - to
      - event: RewardAdded(address indexed token, uint256 rewardAmount)
